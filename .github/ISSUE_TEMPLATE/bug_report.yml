name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true

  - type: dropdown
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Android App
        - Bridge (Python)
        - Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Current Behavior
      description: A concise description of what you're experiencing.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: A concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      description: |
        Please provide details about your environment:
        - Android version:
        - Device model:
        - Kali Linux version:
        - Bridge version:
        - Installation method:
      value: |
        - Android version:
        - Device:
        - Kali version:
        - Bridge version:
        - Installation:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue!

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.

  - type: checkboxes
    attributes:
      label: Security Considerations
      description: For security vulnerabilities, please do NOT use this template. See [SECURITY.md](../SECURITY.md).
      options:
        - label: This is not a security vulnerability
          required: true
